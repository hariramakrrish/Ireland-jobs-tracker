name: Daily Supabase Snapshot

# Daily recovery backstop. Runs at 06:00 UTC, an hour before the daily
# pipeline runs at 07:00 UTC, so the snapshot always reflects the previous
# day's settled state (no in-flight pipeline writes).
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch Supabase rows via /api/jobs
        run: python scripts/snapshot_supabase.py

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/jobs-snapshot-*.json
          if git diff --cached --quiet; then
            echo "No snapshot changes (data identical to last run)."
            exit 0
          fi
          git commit -m "snapshot: Supabase jobs table $(date -u +'%Y-%m-%d')"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            if git push; then exit 0; fi
            sleep 5
          done
          echo "ERROR: push failed after 3 attempts"
          exit 1

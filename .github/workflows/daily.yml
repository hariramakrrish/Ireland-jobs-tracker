name: Daily Job Search & Resume Generator

on:
  schedule:
    - cron: '0 7 * * *'      # 07:00 UTC every day (08:00 IST / 08:00 Ireland summer)
  workflow_dispatch:           # also allows manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search & resume generation
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit and push new resumes + updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull FIRST so any commits pushed during the 1.5-hr run are already
          # integrated before we create our commit — avoids rebase conflicts on jobs.json
          git pull --rebase origin main
          git add web/data/jobs.json web/resumes/
          git diff --cached --quiet || git commit -m "chore: daily job update $(date +'%Y-%m-%d')"
          git push

name: Daily Job Search & Resume Generator

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search & resume generation
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit and push new resumes + updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp web/data/jobs.json /tmp/pipeline_jobs.json
          # Snapshot only the NEW resume PDFs this run produced.
          # We will rebase onto remote main and only re-apply these — never
          # restage existing PDFs (those may have been updated by other
          # workflows that ran in parallel).
          mkdir -p /tmp/new_resumes
          git status --porcelain web/resumes/ | awk '$1 ~ /^[?A]/ {print $2}' > /tmp/new_pdfs.list
          while IFS= read -r p; do
            [ -n "$p" ] && cp "$p" "/tmp/new_resumes/$(basename "$p")"
          done < /tmp/new_pdfs.list
          NEW_PDF_COUNT=$(wc -l < /tmp/new_pdfs.list)
          echo "Snapshot of $NEW_PDF_COUNT new PDFs taken before rebase"

          MAX_ATTEMPTS=5
          attempt=0
          while [ $attempt -lt $MAX_ATTEMPTS ]; do
            attempt=$((attempt + 1))
            echo "--- Push attempt $attempt of $MAX_ATTEMPTS ---"
            git fetch origin main
            git checkout origin/main -- .                     # hard-rebase to remote
            python3 scripts/smart_merge.py                    # merge pipeline_jobs.json into jobs.json
            while IFS= read -r p; do
              [ -n "$p" ] && [ -f "/tmp/new_resumes/$(basename "$p")" ] && cp "/tmp/new_resumes/$(basename "$p")" "$p"
            done < /tmp/new_pdfs.list
            git add web/data/jobs.json
            while IFS= read -r p; do [ -n "$p" ] && git add "$p"; done < /tmp/new_pdfs.list
            if git diff --cached --quiet; then
              echo "No new data to push."
              exit 0
            fi
            git commit -m "chore: daily job update $(date +'%Y-%m-%d')"
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — retrying..."
            git reset HEAD~1
            sleep 5
          done

          echo "ERROR: could not push after $MAX_ATTEMPTS attempts."
          exit 1

name: Daily Job Search & Resume Generator

on:
  schedule:
    - cron: '0 7 * * *'      # 07:00 UTC every day (08:00 IST / 08:00 Ireland summer)
  workflow_dispatch:           # also allows manual trigger from GitHub UI

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search & resume generation
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit and push new resumes + updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch latest remote state (captures any manual edits made during the 1.5-hr run)
          git fetch origin main

          # Smart merge: remote jobs.json is the source of truth for statuses.
          # Pipeline output only contributes NEW jobs not already on remote.
          # This means manual status updates / deletions made during the run are preserved.
          python3 - << 'PYEOF'
import json, subprocess, sys

# Pipeline-generated jobs (new + all existing from checkout 1.5h ago)
with open("web/data/jobs.json") as f:
    pipeline_jobs = json.load(f)

# Latest remote jobs (has updated statuses, deletions, manual changes)
result = subprocess.run(
    ["git", "show", "origin/main:web/data/jobs.json"],
    capture_output=True, text=True
)
if result.returncode != 0:
    print("Could not read remote jobs.json — using pipeline output as-is")
    sys.exit(0)

remote_jobs = json.loads(result.stdout)
remote_ids  = {j["id"] for j in remote_jobs}

# Only keep pipeline jobs that are genuinely new (not in remote)
new_jobs = [j for j in pipeline_jobs if j["id"] not in remote_ids]

# Merged = remote (source of truth for statuses) + new pipeline jobs
merged = remote_jobs + new_jobs

# Renumber
for i, j in enumerate(merged, 1):
    j["num"] = i

with open("web/data/jobs.json", "w") as f:
    json.dump(merged, f, indent=2)

print(f"Remote jobs: {len(remote_jobs)}, New from pipeline: {len(new_jobs)}, Total: {len(merged)}")
PYEOF

          # Move HEAD to latest remote (soft — keeps working tree intact)
          git reset --soft origin/main

          git add web/data/jobs.json web/resumes/
          git diff --cached --quiet || git commit -m "chore: daily job update $(date +'%Y-%m-%d')"
          git push

name: Daily Job Search & Resume Generator

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job search & resume generation
        env:
          APIFY_TOKEN:      ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit and push new resumes + updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp web/data/jobs.json /tmp/pipeline_jobs.json

          MAX_ATTEMPTS=5
          attempt=0
          while [ $attempt -lt $MAX_ATTEMPTS ]; do
            attempt=$((attempt + 1))
            echo "--- Push attempt $attempt of $MAX_ATTEMPTS ---"
            git fetch origin main
            python3 scripts/smart_merge.py
            git reset --soft origin/main
            git add web/data/jobs.json web/resumes/
            if git diff --cached --quiet; then
              echo "No new data to push."
              exit 0
            fi
            git commit -m "chore: daily job update $(date +'%Y-%m-%d')"
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push rejected — retrying..."
            git reset HEAD~1
            sleep 5
          done

          echo "ERROR: could not push after $MAX_ATTEMPTS attempts."
          exit 1
